<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML ＆CSS測驗系統</title>

<style>
body {
font-family: Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

.card {
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 3px 14px rgba(0,0,0,.1);
}

.topbar {
display:flex;
justify-content:space-between;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.progress-box {
background:#eef4ff;
padding:12px 16px;
border-radius:12px;
font-weight:bold;
}

.answer-wrap {
display:flex;
gap:12px;
}

.correct-box {
background:#e8fff0;
padding:12px 16px;
border-radius:12px;
font-weight:bold;
color:#157347;
border:2px solid #b7ebc6;
}

.wrong-box {
background:#fff0f0;
padding:12px 16px;
border-radius:12px;
font-weight:bold;
color:#c62828;
border:2px solid #f3b0b0;
}

.opt-btn {
display:block;
width:100%;
padding:14px;
margin-bottom:12px;
text-align:left;
border-radius:12px;
border:1px solid #ccc;
background:white;
cursor:pointer;
font-size:15px;
}

.opt-btn:hover {
background:#f7f7f7;
}

.correct {
background:#dff5e3;
}

.wrong {
background:#ffe1e1;
}

.reveal {
background:#dceeff;
}

button {
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
}

#explainBox {
margin-top:15px;
padding:15px;
background:#fafafa;
border-radius:12px;
line-height:1.7;
}

.summary-grid {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin:20px 0;
}

.summary-card {
padding:20px;
border-radius:14px;
text-align:center;
background:#fafafa;
border:1px solid #eee;
}

.summary-number {
font-size:32px;
font-weight:bold;
}

@media(max-width:600px){
.summary-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="card">

<div id="nameScreen">
<h1>AI 智慧 HTML 測驗系統</h1>
<p>共 20 題｜測驗結果會自動儲存到雲端資料庫</p>

<input id="nameInput" placeholder="請輸入姓名或學號"
style="width:100%;padding:14px;border-radius:12px;border:1px solid #ccc;">

<br><br>

<button onclick="startQuiz()" style="background:#111;color:white;">
開始測驗
</button>

</div>

<div id="quizScreen" style="display:none;">

<div class="topbar">

<div class="progress-box">
📘 作答進度：<span id="progressText"></span>
</div>

<div class="answer-wrap">

<div class="correct-box">
✅ 答對：<span id="scoreText">0</span>
</div>

<div class="wrong-box">
❌ 答錯：<span id="wrongText">0</span>
</div>

</div>

</div>

<h2 id="qText"></h2>

<div id="optionsArea"></div>

<div id="explainBox"></div>

<button id="nextBtn"
onclick="nextQ()"
style="display:none;background:#111;color:white;">
下一題
</button>

</div>

<div id="scoreScreen" style="display:none;"></div>

</div>

<script>

const questions = [

{q:"HTML 的全名是什麼？",opts:["HyperText Markup Language","HighTech Marking Links","HyperTool Main Language"],ans:0,exp:"HTML 代表超文字標記語言。"},
{q:"HTML 的本質是什麼？",opts:["程式語言","標記語言","影像格式"],ans:1,exp:"HTML 是標記語言。"},
{q:"伺服器與瀏覽器之間透過什麼協定進行對話？",opts:["HTML","HTTP","CSS"],ans:1,exp:"HTTP 是網頁傳輸協定。"},
{q:"網頁檔案的預設主檔案名稱通常叫什麼？",opts:["main.html","home.html","index.html"],ans:2,exp:"index.html 是預設首頁檔案。"},
{q:"HTML 標籤層層包裹的結構稱為什麼？",opts:["網狀結構","巢狀結構","水平結構"],ans:1,exp:"HTML 使用巢狀結構。"},
{q:"實際在網頁畫面中看到的內容，是寫在哪個標籤內？",opts:["&lt;head&gt;","&lt;body&gt;","&lt;meta&gt;"],ans:1,exp:"&lt;body&gt; 包含網頁可見內容。"},
{q:"代表最重要大標題的標籤是？",opts:["&lt;h6&gt;","&lt;h1&gt;","&lt;p&gt;"],ans:1,exp:"&lt;h1&gt; 是最高層級標題。"},
{q:"HTML5 語意標籤中，&lt;nav&gt; 的主要用途是？",opts:["放廣告","放導覽列","放版權"],ans:1,exp:"&lt;nav&gt; 用於網站導覽。"},
{q:"網頁底部版權資訊通常放在哪個標籤？",opts:["&lt;header&gt;","&lt;section&gt;","&lt;footer&gt;"],ans:2,exp:"&lt;footer&gt; 用於頁尾資訊。"},
{q:"想建立有順序的清單要用哪個標籤？",opts:["&lt;ul&gt;","&lt;ol&gt;","&lt;li&gt;"],ans:1,exp:"&lt;ol&gt; 是有序清單。"},
{q:"超連結標籤 &lt;a&gt; 使用哪個屬性指定網址？",opts:["src","href","alt"],ans:1,exp:"href 用來指定連結網址。"},
{q:"圖片標籤 &lt;img&gt; 的替代文字屬性是？",opts:["title","alt","href"],ans:1,exp:"alt 是圖片替代文字。"},
{q:"哪個標籤可強制換行？",opts:["&lt;br&gt;","&lt;hr&gt;","&lt;p&gt;"],ans:0,exp:"&lt;br&gt; 可強制換行。"},
{q:"哪個標籤代表主要內容區？",opts:["&lt;main&gt;","&lt;div&gt;","&lt;aside&gt;"],ans:0,exp:"&lt;main&gt; 代表頁面主要內容。"},
{q:"HTML 註解的正確寫法是？",opts:["// 註解","/* 註解 */","&lt;!-- 註解 --&gt;"],ans:2,exp:"HTML 註解使用 &lt;!-- --&gt;。"},
{q:"哪個標籤可建立表格列？",opts:["&lt;td&gt;","&lt;table&gt;","&lt;tr&gt;"],ans:2,exp:"&lt;tr&gt; 代表表格列。"},
{q:"colspan 的用途是？",opts:["垂直合併","水平合併","設定邊框"],ans:1,exp:"colspan 用於水平跨欄。"},
{q:"target='_blank' 的作用是？",opts:["新分頁開啟","重新整理","下載檔案"],ans:0,exp:"_blank 可在新分頁開啟。"},
{q:"哪個標籤可插入圖片？",opts:["&lt;img&gt;","&lt;picture&gt;","&lt;src&gt;"],ans:0,exp:"&lt;img&gt; 用來插入圖片。"},
{q:"CSS 通常使用哪種副檔名？",opts:[".html",".css",".js"],ans:1,exp:"CSS 檔案副檔名是 .css。"}

];

let idx = 0;
let score = 0;
let wrong = 0;
let history = [];
let userName = '';

function startQuiz(){
const n = document.getElementById('nameInput').value.trim();

if(!n){
alert('請輸入姓名/座號');
return;
}

userName=n;

document.getElementById('nameScreen').style.display='none';
document.getElementById('quizScreen').style.display='block';

renderQ();
}

function updateTopbar(){
document.getElementById('progressText').innerText =
`${idx+1} / ${questions.length}`;

document.getElementById('scoreText').innerText = score;
document.getElementById('wrongText').innerText = wrong;
}

function renderQ(){
updateTopbar();

const q = questions[idx];

document.getElementById('qText').innerHTML =
`Q${idx+1}. ${q.q}`;

const area = document.getElementById('optionsArea');

area.innerHTML='';

q.opts.forEach((o,i)=>{

const btn=document.createElement('button');

btn.className='opt-btn';

btn.innerHTML=o;

btn.onclick=()=>pick(i);

area.appendChild(btn);

});

document.getElementById('explainBox').innerHTML='';
document.getElementById('nextBtn').style.display='none';
}

function pick(i){

const q=questions[idx];

const btns=document.querySelectorAll('.opt-btn');

btns.forEach(b=>b.disabled=true);

if(i===q.ans){

btns[i].classList.add('correct');

score++;

} else {

btns[i].classList.add('wrong');

btns[q.ans].classList.add('reveal');

wrong++;

}

updateTopbar();

history.push({
question:q.q,
your:q.opts[i],
correct:q.opts[q.ans],
isCorrect:i===q.ans
});

document.getElementById('explainBox').innerHTML =
`<strong>解析：</strong> ${q.exp}`;

document.getElementById('nextBtn').style.display='inline-block';
}

function nextQ(){

idx++;

if(idx<questions.length){
renderQ();
} else {
showScore();
}

}

async function saveResult(){

const payload = {
name:userName,
score:score,
wrong:wrong,
percent:Math.round(score/questions.length*100),
history:history
};

try {

await fetch('https://script.google.com/macros/s/AKfycbwQFho0NIqup9YrjdoCtJvNr25HQAPx4MkQtPmQZntjwWQUk9nQMnyli-qwTGM1RnZQ/exec', {
method:'POST',
body:JSON.stringify(payload)
});

console.log('成績已寫入 Google 資料庫');

} catch(err) {
console.error(err);
}

}

async function showScore(){

document.getElementById('quizScreen').style.display='none';

await saveResult();

const pct=Math.round(score/questions.length*100);

document.getElementById('scoreScreen').style.display='block';

const wrongItems=history.filter(h=>!h.isCorrect);

document.getElementById('scoreScreen').innerHTML=`

<h1>${userName} 的測驗結果</h1>

<div class="summary-grid">

<div class="summary-card">
<div class="summary-number">${score}</div>
<div>答對</div>
</div>

<div class="summary-card">
<div class="summary-number">${wrong}</div>
<div>答錯</div>
</div>

<div class="summary-card">
<div class="summary-number">${pct}%</div>
<div>正確率</div>
</div>

</div>

<h2>🧠 AI 錯題分析</h2>

${wrongItems.length===0 ? `
<p>🎉 恭喜全部答對！</p>
` : wrongItems.map(h=>`
<div style="padding:15px;border:1px solid #ddd;border-radius:12px;margin-bottom:12px;">
<strong>${h.question}</strong><br><br>
❌ 你的答案：${h.your}<br>
✅ 正確答案：${h.correct}
</div>
`).join('')}

<br>

<div style="background:#e8fff0;padding:15px;border-radius:12px;">
✅ 成績已自動儲存到雲端資料庫
</div>

<button onclick="location.reload()"
style="background:#111;color:white;margin-top:20px;">
重新測驗
</button>
`;

}

</script>

</body>
</html>
