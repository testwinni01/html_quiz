<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智慧 HTML 測驗系統</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.card{
max-width:760px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 12px rgba(0,0,0,.1);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:14px;
}

.progress-box{
background:#eef6ff;
padding:8px 14px;
border-radius:10px;
}

.score-box{
background:#ecfff0;
padding:8px 14px;
border-radius:10px;
}

button{
padding:12px 16px;
margin-top:10px;
cursor:pointer;
border:none;
border-radius:10px;
font-size:15px;
}

.opt-btn{
display:block;
width:100%;
margin-bottom:10px;
text-align:left;
background:#fafafa;
border:1px solid #ddd;
}

.opt-btn:hover{
background:#f0f0f0;
}

.correct{
background:#dff0d8;
}

.wrong{
background:#f2dede;
}

.reveal{
background:#d9edf7;
}

#explainBox{
margin-top:15px;
padding:15px;
background:#f8f8f8;
border-radius:10px;
line-height:1.6;
}

.summary-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin:20px 0;
}

.summary-card{
background:#fafafa;
padding:15px;
border-radius:12px;
text-align:center;
border:1px solid #eee;
}

.summary-number{
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<div id="nameScreen">

<h1>AI 智慧 HTML 測驗系統</h1>

<p>請輸入姓名後開始測驗</p>

<input id="nameInput" placeholder="姓名或學號"
style="width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;">

<br><br>

<button onclick="startQuiz()" style="background:#222;color:white;">
開始測驗
</button>

</div>

<div id="quizScreen" style="display:none;">

<div class="topbar">

<div class="progress-box">
📘 進度：<span id="progressText">1 / 10</span>
</div>

<div class="score-box">
✅ 答對：<span id="scoreText">0</span>
❌ 答錯：<span id="wrongText">0</span>
</div>

</div>

<h2 id="qText"></h2>

<div id="optionsArea"></div>

<div id="explainBox"></div>

<button id="nextBtn"
onclick="nextQ()"
style="display:none;background:#222;color:white;">
下一題
</button>

</div>

<div id="scoreScreen" style="display:none;"></div>

</div>

<script>

const questions = [

{q:"HTML 的全名是什麼？",opts:["HyperText Markup Language","HighTech Marking Links","HyperTool Main Language"],ans:0,exp:"HTML 代表超文字標記語言。"},
{q:"HTML 的本質是什麼？",opts:["程式語言","標記語言","影像格式"],ans:1,exp:"HTML 是標記語言。"},
{q:"伺服器與瀏覽器之間透過什麼協定進行對話？",opts:["HTML","HTTP","CSS"],ans:1,exp:"HTTP 是網頁傳輸協定。"},
{q:"網頁檔案的預設主檔案名稱通常叫什麼？",opts:["main.html","home.html","index.html"],ans:2,exp:"index.html 是預設首頁檔案。"},
{q:"HTML 標籤層層包裹的結構稱為什麼？",opts:["網狀結構","巢狀結構","水平結構"],ans:1,exp:"HTML 使用巢狀結構。"},
{q:"實際在網頁畫面中看到的內容，是寫在哪個標籤內？",opts:["&lt;head&gt;","&lt;body&gt;","&lt;meta&gt;"],ans:1,exp:"&lt;body&gt; 包含網頁可見內容。"},
{q:"代表最重要大標題的標籤是？",opts:["&lt;h6&gt;","&lt;h1&gt;","&lt;p&gt;"],ans:1,exp:"&lt;h1&gt; 是最高層級標題。"},
{q:"HTML5 語意標籤中，&lt;nav&gt; 的主要用途是？",opts:["放廣告","放導覽列","放版權"],ans:1,exp:"&lt;nav&gt; 用於網站導覽。"},
{q:"網頁底部版權資訊通常放在哪個標籤？",opts:["&lt;header&gt;","&lt;section&gt;","&lt;footer&gt;"],ans:2,exp:"&lt;footer&gt; 用於頁尾資訊。"},
{q:"想建立有順序的清單要用哪個標籤？",opts:["&lt;ul&gt;","&lt;ol&gt;","&lt;li&gt;"],ans:1,exp:"&lt;ol&gt; 是有序清單。"}

];

let idx = 0;
let score = 0;
let wrong = 0;
let history = [];
let userName = '';

function startQuiz(){

const n = document.getElementById('nameInput').value.trim();

if(!n){
alert('請輸入姓名');
return;
}

userName = n;

document.getElementById('nameScreen').style.display='none';
document.getElementById('quizScreen').style.display='block';

renderQ();

}

function updateTopbar(){

document.getElementById('progressText').innerText =
`${idx+1} / ${questions.length}`;

document.getElementById('scoreText').innerText = score;

document.getElementById('wrongText').innerText = wrong;

}

function renderQ(){

updateTopbar();

const q = questions[idx];

document.getElementById('qText').innerHTML =
`Q${idx+1}. ${q.q}`;

const area = document.getElementById('optionsArea');

area.innerHTML='';

q.opts.forEach((o,i)=>{

const btn = document.createElement('button');

btn.className='opt-btn';

btn.innerHTML=o;

btn.onclick=()=>pick(i);

area.appendChild(btn);

});

document.getElementById('explainBox').innerHTML='';

document.getElementById('nextBtn').style.display='none';

}

function pick(i){

const q = questions[idx];

const btns = document.querySelectorAll('.opt-btn');

btns.forEach(b=>b.disabled=true);

if(i===q.ans){

btns[i].classList.add('correct');

score++;

}else{

btns[i].classList.add('wrong');

btns[q.ans].classList.add('reveal');

wrong++;

}

updateTopbar();

history.push({
question:q.q,
your:q.opts[i],
correct:q.opts[q.ans],
isCorrect:i===q.ans
});

document.getElementById('explainBox').innerHTML =
`<strong>解析：</strong> ${q.exp}`;

document.getElementById('nextBtn').style.display='inline-block';

}

function nextQ(){

idx++;

if(idx < questions.length){

renderQ();

}else{

showScore();

}

}

function showScore(){

document.getElementById('quizScreen').style.display='none';

const pct = Math.round(score/questions.length*100);

document.getElementById('scoreScreen').style.display='block';

const wrongItems = history.filter(h=>!h.isCorrect);

document.getElementById('scoreScreen').innerHTML = `

<h1>${userName} 的測驗結果</h1>

<div class="summary-grid">

<div class="summary-card">
<div class="summary-number">${score}</div>
<div>答對</div>
</div>

<div class="summary-card">
<div class="summary-number">${wrong}</div>
<div>答錯</div>
</div>

<div class="summary-card">
<div class="summary-number">${pct}%</div>
<div>正確率</div>
</div>

</div>

<h2>🧠 AI 錯題分析</h2>

${wrongItems.length===0 ? `
<p>🎉 恭喜全部答對！</p>
` : wrongItems.map(h=>`
<div style="padding:15px;border:1px solid #ddd;border-radius:12px;margin-bottom:12px;">
<strong>${h.question}</strong><br><br>
❌ 你的答案：${h.your}<br>
✅ 正確答案：${h.correct}
</div>
`).join('')}

<br>

<button onclick="location.reload()" style="background:#222;color:white;">
重新測驗
</button>

`;

}

</script>

</body>
</html>
